server:
  port: ${PORT:8082}

spring:
  application:
    name: workout-service
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: ${JWT_SECRET}

aws:
  endpoint: ${AWS_ENDPOINT:}
  region: ${AWS_REGION:us-east-1}

sns:
  topic:
    workout-recorded-arn: ${SNS_WORKOUT_RECORDED_TOPIC_ARN}

logging:
  level:
    root: INFO
