networks:
  upfit-network:
    driver: bridge

services:

  # ─────────────────────────────────────────
  # Infraestrutura
  # ─────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: upfit-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - upfit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  localstack:
    image: localstack/localstack:3
    container_name: upfit-localstack
    environment:
      - SERVICES=sqs,sns,s3
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - localstack-data:/var/lib/localstack
      - ./infra/localstack/setup.sh:/etc/localstack/init/ready.d/setup.sh
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "chmod +x /etc/localstack/init/ready.d/setup.sh && exec docker-entrypoint.sh"
    ports:
      - "4566:4566"
    networks:
      - upfit-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4566/_localstack/health | grep -q '\"sqs\": \"running\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # Microserviços
  # ─────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: upfit-auth
    restart: on-failure
    environment:
      PORT: 8081
      SERVICE_NAME: auth-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/auth_db
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-upfit-local-dev-secret-minimo-32-chars}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-30}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://localstack:4566}
      AWS_PUBLIC_ENDPOINT: ${AWS_PUBLIC_ENDPOINT:-http://localhost:4566}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      S3_PROFILE_ASSETS_BUCKET: ${S3_PROFILE_ASSETS_BUCKET:-profile-assets}
    ports:
      - "8081:8081"
    networks:
      - upfit-network
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  workout-service:
    build:
      context: ./services/workout-service
      dockerfile: Dockerfile
    container_name: upfit-workout
    restart: on-failure
    environment:
      PORT: 8082
      SERVICE_NAME: workout-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/workout_db
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-upfit-local-dev-secret-minimo-32-chars}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://localstack:4566}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      SNS_WORKOUT_RECORDED_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:WorkoutRecordedTopic
    ports:
      - "8082:8082"
    networks:
      - upfit-network
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  progression-service:
    build:
      context: ./services/progression-service
      dockerfile: Dockerfile
    container_name: upfit-progression
    restart: on-failure
    environment:
      PORT: 8083
      SERVICE_NAME: progression-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/progression_db
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-upfit-local-dev-secret-minimo-32-chars}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://localstack:4566}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      SQS_PROGRESSION_QUEUE_URL: http://localstack:4566/000000000000/ProgressionQueue
      NOTIFICATION_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:NotificationTopic
      S3_CONFIG_BUCKET: upfit-config
    ports:
      - "8083:8083"
    networks:
      - upfit-network
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  group-service:
    build:
      context: ./services/group-service
      dockerfile: Dockerfile
    container_name: upfit-group
    restart: on-failure
    environment:
      PORT: 8084
      SERVICE_NAME: group-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/group_db
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-upfit-local-dev-secret-minimo-32-chars}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://localstack:4566}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      SQS_GROUP_QUEUE_URL: http://localstack:4566/000000000000/GroupQueue
      NOTIFICATION_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:NotificationTopic
      S3_GROUP_ASSETS_BUCKET: group-assets
      S3_CONFIG_BUCKET: upfit-config
    ports:
      - "8084:8084"
    networks:
      - upfit-network
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  challenge-service:
    build:
      context: ./services/challenge-service
      dockerfile: Dockerfile
    container_name: upfit-challenge
    restart: on-failure
    environment:
      PORT: 8085
      SERVICE_NAME: challenge-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/challenge_db
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://localstack:4566}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      JWT_SECRET: ${JWT_SECRET:-upfit-local-dev-secret-minimo-32-chars}
      SQS_CHALLENGE_QUEUE_URL: http://localstack:4566/000000000000/ChallengeQueue
      NOTIFICATION_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:NotificationTopic
      S3_CHALLENGE_ASSETS_BUCKET: challenge-assets
    ports:
      - "8085:8085"
    networks:
      - upfit-network
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: upfit-notification
    restart: on-failure
    environment:
      PORT: 8086
      SERVICE_NAME: notification-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/notification_db
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://localstack:4566}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      JWT_SECRET: ${JWT_SECRET:-upfit-local-dev-secret-minimo-32-chars}
      SQS_NOTIFICATION_QUEUE_URL: http://localstack:4566/000000000000/NotificationQueue
    ports:
      - "8086:8086"
    networks:
      - upfit-network
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: upfit-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - upfit-network
    depends_on:
      - auth-service
      - workout-service
      - progression-service
      - group-service
      - challenge-service
      - notification-service

volumes:
  postgres-data:
  localstack-data:
