events {
    worker_connections 1024;
}

http {

    # ─── Upstreams ────────────────────────────────────────────────────────────────
    upstream auth-service         { server auth-service:8081; }
    upstream workout-service      { server workout-service:8082; }
    upstream progression-service  { server progression-service:8083; }
    upstream group-service        { server group-service:8084; }
    upstream challenge-service    { server challenge-service:8085; }
    upstream notification-service { server notification-service:8086; }

    server {
        listen 8080;

        # ─── Roteamento por path ──────────────────────────────────────────────────

        location /auth/ {
            proxy_pass         http://auth-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Authorization $http_authorization;
        }

        location /profile {
            proxy_pass         http://auth-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Authorization $http_authorization;
        }

        location /workouts {
            proxy_pass         http://workout-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Authorization $http_authorization;
        }

        location /progression {
            proxy_pass         http://progression-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Authorization $http_authorization;
        }

        location /achievements {
            proxy_pass         http://progression-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Authorization $http_authorization;
        }

        location /groups {
            proxy_pass         http://group-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Authorization $http_authorization;
        }

        location /challenges {
            proxy_pass         http://challenge-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Authorization $http_authorization;
        }

        location /notifications {
            proxy_pass         http://notification-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Authorization $http_authorization;
        }
    }
}
